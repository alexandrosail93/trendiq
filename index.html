<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrendIQ">
<meta name="theme-color" content="#07090E">
<title>TrendIQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090E;--s1:#0C1018;--s2:#111822;--s3:#18222E;--bd:#1C2A3C;
  --txt:#C4D4E8;--mut:#4E6070;
  --bull:#00DFA0;--bear:#FF3F5A;--warn:#FFB820;--blue:#38A0FF;
  --mono:'DM Mono',monospace;--disp:'Unbounded',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:var(--mono);overscroll-behavior:none}
button{cursor:pointer;font-family:var(--mono)}

/* HEADER */
.hdr{
  background:linear-gradient(160deg,#07090E 0%,#0C1520 55%,#061210 100%);
  border-bottom:1px solid var(--bd);
  padding:calc(var(--st) + 14px) 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,223,160,.2),transparent)}
.logo{font-family:var(--disp);font-size:clamp(18px,5vw,24px);font-weight:900;letter-spacing:-.02em;color:#fff}
.logo em{color:var(--bull);font-style:normal}
.hdr-r{display:flex;align-items:center;gap:10px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--mut);transition:all .4s;flex-shrink:0}
.sync-dot.ok{background:var(--bull);box-shadow:0 0 8px rgba(0,223,160,.5)}
.sync-dot.err{background:var(--bear)}
.sync-dot.spin{background:var(--warn);animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-gear{background:var(--s2);border:1px solid var(--bd);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--mut);transition:all .15s}
.btn-gear:hover{border-color:var(--bull);color:var(--bull)}

/* PAGES */
.page{display:none;min-height:calc(100vh - 56px);padding-bottom:calc(var(--sb) + 28px)}
.page.act{display:block}

/* ── HOME ── */
.home-top{padding:16px 16px 8px;max-width:620px;margin:0 auto}
.add-row{display:flex;gap:8px;background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:4px 4px 4px 14px;transition:border-color .2s;margin-bottom:10px}
.add-row:focus-within{border-color:var(--bull);box-shadow:0 0 0 3px rgba(0,223,160,.07)}
.add-inp{flex:1;background:none;border:none;outline:none;font-family:var(--mono);font-size:15px;font-weight:500;color:#fff;letter-spacing:.04em;padding:9px 0;text-transform:none}
.add-inp::placeholder{color:var(--mut);font-weight:300;letter-spacing:0}
.btn-add{background:var(--bull);color:#000;border:none;border-radius:9px;padding:9px 18px;font-family:var(--disp);font-size:9px;font-weight:700;letter-spacing:.08em;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn-add:hover{opacity:.85}
.btn-add:active{transform:scale(.95)}
.btn-add:disabled{opacity:.35;cursor:not-allowed}

.sec-lbl{font-size:9px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase;padding:0 16px;margin-bottom:8px;max-width:620px;margin-left:auto;margin-right:auto}

/* TICKER LIST */
.ticker-list{max-width:620px;margin:0 auto;padding:0 12px}
.ticker-row{
  background:var(--s1);border:1px solid var(--bd);border-radius:14px;
  padding:13px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .2s,transform .1s,background .15s
}
.ticker-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 14px;background:var(--rc,var(--mut));transition:background .3s}
.ticker-row:hover{border-color:rgba(255,255,255,.08);background:var(--s2);transform:translateX(2px)}
.ticker-row.fav{--rc:var(--warn)}
.ticker-row.bull{--rc:var(--bull)}
.ticker-row.hold{--rc:var(--blue)}
.ticker-row.weak{--rc:var(--warn)}
.ticker-row.bear{--rc:var(--bear)}

/* mini ring */
.mini-ring{position:relative;width:46px;height:46px;flex-shrink:0}
.mini-ring svg{width:46px;height:46px;transform:rotate(-90deg)}
.mr-bg{fill:none;stroke:var(--s3);stroke-width:4}
.mr-fg{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:113;stroke-dashoffset:113;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.mr-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:12px;font-weight:900;color:#fff}

.tr-info{flex:1;min-width:0}
.tr-tk{font-family:var(--disp);font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em}
.tr-name{font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.tr-badge{display:inline-block;margin-top:5px;padding:2px 8px;border-radius:20px;font-size:8px;font-weight:500;letter-spacing:.08em;border:1px solid transparent}
.tr-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.tr-price{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--txt)}
.tr-pill{font-size:9px;padding:1px 7px;border-radius:10px;letter-spacing:.04em;white-space:nowrap}
.tr-pill.g{background:rgba(0,223,160,.12);color:var(--bull)}
.tr-pill.b{background:rgba(255,63,90,.12);color:var(--bear)}
.tr-pill.w{background:rgba(255,184,32,.12);color:var(--warn)}
.tr-pill.l{background:rgba(56,160,255,.12);color:var(--blue)}
.tr-pill.n{background:var(--s3);color:var(--mut)}

.tr-tf{display:flex;flex-direction:column;gap:3px;flex-shrink:0;align-items:flex-end}
.tf-pip{display:flex;gap:3px;align-items:center}
.pip-lbl{font-size:8px;color:var(--mut);width:11px;text-align:right}
.pip-bar{height:4px;border-radius:2px;background:var(--s3);width:34px;overflow:hidden}
.pip-fill{height:100%;border-radius:2px;width:0%;transition:width 1.1s ease}

.tr-actions{display:flex;flex-direction:column;gap:5px;align-items:center;flex-shrink:0;padding-left:4px}
.btn-star{
  background:var(--s2);border:1px solid var(--bd);
  border-radius:7px;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--mut);
  transition:all .15s;line-height:1
}
.btn-star.on{background:rgba(255,184,32,.12);border-color:rgba(255,184,32,.4);color:var(--warn)}
.btn-star:hover{border-color:var(--warn);color:var(--warn);transform:scale(1.1)}
.btn-del{background:none;border:none;font-size:11px;color:var(--mut);opacity:.35;transition:opacity .15s;line-height:1;padding:2px}
.btn-del:hover{opacity:1;color:var(--bear)}

/* loading row */
.row-loading{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:15px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px;color:var(--mut);font-size:11px}
.row-spin{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--bull);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:52px 24px;color:var(--mut)}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:.4}
.empty-t{font-size:11px;line-height:1.8}

/* ── DETAIL PAGE ── */
.det-hdr{
  background:var(--bg);border-bottom:1px solid var(--bd);
  padding:calc(var(--st) + 14px) 16px 14px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50
}
.btn-back{background:var(--s2);border:1px solid var(--bd);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--mut);flex-shrink:0;transition:all .15s}
.btn-back:hover{border-color:var(--bull);color:var(--bull)}
.det-htk{font-family:var(--disp);font-size:17px;font-weight:900;color:#fff}
.det-hname{font-size:10px;color:var(--mut);margin-top:1px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-det-star{background:none;border:none;font-size:21px;opacity:.3;transition:all .2s;flex-shrink:0}
.btn-det-star.on{opacity:1}

.det-body{padding:14px 14px 48px;max-width:620px;margin:0 auto}

/* HERO */
.hero{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:20px 16px 16px;margin-bottom:10px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--hc,var(--bull)),transparent)}
.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.big-ring{position:relative;width:92px;height:92px;flex-shrink:0}
.big-ring svg{width:92px;height:92px;transform:rotate(-90deg)}
.br-bg{fill:none;stroke:var(--s3);stroke-width:7}
.br-fg{fill:none;stroke-width:7;stroke-linecap:round;stroke-dasharray:245;stroke-dashoffset:245;transition:stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1)}
.br-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.br-val{font-family:var(--disp);font-size:21px;font-weight:900;color:#fff;line-height:1}
.br-sub{font-size:9px;color:var(--mut);margin-top:2px}
.hero-info{flex:1;min-width:0}
.hi-lbl{font-size:9px;color:var(--mut);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.hi-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-family:var(--disp);font-size:8px;font-weight:700;letter-spacing:.1em;margin-bottom:8px}
.hi-sig{font-size:12px;font-weight:500;letter-spacing:.06em}

/* TF grid */
.tf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.tfc{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:10px 8px;text-align:center}
.tfc-l{font-size:8px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.tfc-w{font-size:8px;color:var(--mut);margin-bottom:5px}
.tfc-v{font-family:var(--disp);font-size:16px;font-weight:900;color:#fff;line-height:1}
.tfc-d{font-size:10px;color:var(--mut)}
.tfc-bar{height:3px;background:var(--s3);border-radius:2px;margin-top:6px;overflow:hidden}
.tfc-fill{height:100%;border-radius:2px;width:0%;transition:width 1.1s ease}

/* section card */
.sec{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:14px;margin-bottom:10px}
.sec-t{font-size:9px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}

/* donchian */
.dc-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:8px}
.dc-labels .v{color:var(--txt);font-weight:500}
.dc-track{position:relative;height:26px;background:var(--s3);border-radius:8px;overflow:visible;margin-bottom:7px}
.dc-zone{position:absolute;inset:0;border-radius:8px;background:linear-gradient(90deg,rgba(255,63,90,.08) 0%,rgba(255,184,32,.05) 35%,rgba(56,160,255,.05) 65%,rgba(0,223,160,.12) 100%)}
.dc-mid{position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--bd)}
.dc-mark{position:absolute;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid var(--bg);box-shadow:0 0 10px rgba(255,255,255,.3);z-index:2;transition:left 1.2s cubic-bezier(.4,0,.2,1)}
.dc-txt{font-size:10px;color:var(--mut);text-align:center}
.dc-txt strong{color:var(--txt)}

/* metrics 2-col */
.m2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mc{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:10px 12px}
.mc-l{font-size:8px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.mc-v{font-family:var(--disp);font-size:13px;font-weight:700;line-height:1.2;margin-bottom:2px}
.mc-s{font-size:9px;color:var(--mut)}
.cg{color:var(--bull)}.cb{color:var(--bear)}.cw{color:var(--warn)}.cl{color:var(--blue)}.cn{color:var(--txt)}

/* ATR stop */
.stop-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.stop-badge{font-size:9px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.sb-safe{background:rgba(0,223,160,.1);color:var(--bull)}
.sb-warn{background:rgba(255,184,32,.1);color:var(--warn)}
.sb-hit{background:rgba(255,63,90,.1);color:var(--bear)}
.stop-row{display:flex;justify-content:space-between;align-items:flex-end}
.stop-price{font-family:var(--disp);font-size:18px;font-weight:700;color:var(--txt)}
.stop-dist{font-size:9px;color:var(--mut);margin-top:2px}
.stop-cur-lbl{font-size:9px;color:var(--mut);text-align:right;margin-bottom:2px}
.stop-cur-val{font-family:var(--disp);font-size:18px;font-weight:700;color:var(--txt)}

/* bars */
.brow{margin-bottom:9px}
.brow:last-child{margin-bottom:0}
.bhdr{display:flex;justify-content:space-between;margin-bottom:3px}
.bname{font-size:10px;color:var(--txt)}
.bpts{font-size:10px;font-weight:500}
.btrack{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.bfill{height:100%;border-radius:2px;width:0%;transition:width 1.3s cubic-bezier(.4,0,.2,1)}

/* method */
.meth{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:12px 14px;font-size:10px;line-height:1.8;color:var(--mut)}
.meth strong{color:var(--txt)}
.det-ts{font-size:9px;color:var(--mut);text-align:center;margin-top:8px}

/* color helpers */
.badge-g{background:rgba(0,223,160,.1);color:var(--bull);border:1px solid rgba(0,223,160,.2)}
.badge-b{background:rgba(255,63,90,.1);color:var(--bear);border:1px solid rgba(255,63,90,.2)}
.badge-w{background:rgba(255,184,32,.1);color:var(--warn);border:1px solid rgba(255,184,32,.2)}
.badge-l{background:rgba(56,160,255,.1);color:var(--blue);border:1px solid rgba(56,160,255,.2)}

/* MODAL */
.modal-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:22px;width:100%;max-width:400px;animation:mIn .22s cubic-bezier(.4,0,.2,1)}
@keyframes mIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.m-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.m-title{font-family:var(--disp);font-size:11px;font-weight:700;color:#fff;letter-spacing:.06em}
.m-close{background:var(--s2);border:1px solid var(--bd);border-radius:7px;width:28px;height:28px;font-size:13px;color:var(--mut);display:flex;align-items:center;justify-content:center;transition:all .15s}
.m-close:hover{border-color:var(--bear);color:var(--bear)}
.m-lbl{font-size:9px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.m-inp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;font-family:var(--mono);font-size:12px;color:#fff;outline:none;margin-bottom:12px;transition:border-color .2s}
.m-inp:focus{border-color:var(--bull)}
.m-inp::placeholder{color:var(--mut)}
.btn-connect{width:100%;background:var(--bull);color:#000;border:none;border-radius:9px;padding:11px;font-family:var(--disp);font-size:9px;font-weight:700;letter-spacing:.08em;margin-bottom:10px;transition:opacity .15s}
.btn-connect:hover{opacity:.85}
.m-status{font-size:11px;min-height:16px;margin-bottom:10px;transition:color .2s}
.m-status.ok{color:var(--bull)}.m-status.err{color:var(--bear)}
.m-div{border:none;border-top:1px solid var(--bd);margin:12px 0}
.btn-danger{width:100%;background:rgba(255,63,90,.08);border:1px solid rgba(255,63,90,.2);color:var(--bear);border-radius:9px;padding:10px;font-family:var(--mono);font-size:11px;transition:all .15s}
.btn-danger:hover{background:rgba(255,63,90,.18)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--sb) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--s3);border:1px solid var(--bd);border-radius:10px;padding:9px 18px;font-size:11px;color:var(--txt);z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="page act" id="pageHome">
  <header class="hdr">
    <div class="logo">Trend<em>IQ</em></div>
    <div class="hdr-r">
      <div class="sync-dot" id="syncDot" title="Stato Supabase"></div>
      <button class="btn-gear" onclick="openSettings()">⚙</button>
    </div>
  </header>

  <div class="home-top">
    <div class="add-row">
      <input class="add-inp" id="addInp" type="text"
        placeholder="Ticker o nome azienda  (es. NVDA, Nvidia, ASML…)"
        autocorrect="off" autocapitalize="none" spellcheck="false" autocomplete="off">
      <button class="btn-add" id="btnAdd" onclick="addTicker()">+ ADD</button>
    </div>
  </div>

  <div class="sec-lbl" id="listLabel">— watchlist —</div>
  <div class="ticker-list" id="tickerList">
    <div class="empty">
      <div class="empty-icon">📡</div>
      <div class="empty-t">Nessun ticker in watchlist.<br>Inserisci un ticker o il nome dell'azienda e premi ADD.</div>
    </div>
  </div>
</div>

<!-- ══ DETAIL ══ -->
<div class="page" id="pageDetail">
  <header class="det-hdr">
    <button class="btn-back" onclick="goHome()">←</button>
    <div style="flex:1;min-width:0">
      <div class="det-htk" id="detTk">—</div>
      <div class="det-hname" id="detName">—</div>
    </div>
    <button class="btn-det-star" id="btnDetStar" onclick="toggleFavDet()">☆</button>
  </header>
  <div class="det-body" id="detBody"></div>
</div>

<!-- ══ SETTINGS MODAL ══ -->
<div class="modal-ov" id="settingsOv" onclick="closeSettingsOut(event)">
  <div class="modal">
    <div class="m-hdr">
      <div class="m-title">⚙ IMPOSTAZIONI SUPABASE</div>
      <button class="m-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="m-lbl">Project URL</div>
    <input class="m-inp" id="sbUrlI" type="text" placeholder="https://xxxxxxxx.supabase.co" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="m-lbl">Anon Key</div>
    <input class="m-inp" id="sbKeyI" type="password" placeholder="eyJhbGciOiJIUzI1NiIs…" autocomplete="off">
    <button class="btn-connect" onclick="connectSupabase()">Connetti e Sincronizza</button>
    <div class="m-status" id="mSt"></div>
    <hr class="m-div">
    <div class="m-lbl" style="margin-bottom:8px">Dati locali</div>
    <button class="btn-danger" onclick="clearAll()">🗑 Cancella tutti i dati locali</button>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script>
// ── KEYS ──
const K_WL  = 'tiq_wl_v1';
const K_SC  = 'tiq_sc_v1';
const K_URL = 'tiq_sb_url';
const K_KEY = 'tiq_sb_key';
const SB_ROW= 'trendiq_wl';

// ── STATE ──
let watchlist = [];   // [{ticker, name, fav}]
let scores    = {};   // {TICKER: scoreObj}
let currentTk = null;

// ── SUPABASE ──
const sbUrl  = () => localStorage.getItem(K_URL) || '';
const sbKey  = () => localStorage.getItem(K_KEY) || '';
const sbOk   = () => !!(sbUrl() && sbKey());
function dot(s){ document.getElementById('syncDot').className = 'sync-dot' + (s ? ' '+s : ''); }

async function sbGet(key){
  if(!sbOk()) return null;
  try{
    const r = await fetch(`${sbUrl()}/rest/v1/data?key=eq.${key}&select=value`,{
      headers:{'apikey':sbKey(),'Authorization':'Bearer '+sbKey()}
    });
    const rows = await r.json();
    return Array.isArray(rows) ? (rows[0]?.value ?? null) : null;

// ── YAHOO FINANCE ──
async function fetchYahoo(ticker){
  const p2=Math.floor(Date.now()/1000), p1=p2-548*86400;
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&period1=${p1}&period2=${p2}`;
  const proxies=[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`
  ];
  for(const px of proxies){
    try{
      const res=await fetch(px,{signal:AbortSignal.timeout(14000)});
      if(!res.ok) continue;
      const j=await res.json();
      const r=j.chart?.result?.[0];
      if(!r?.timestamp) continue;
      const q=r.indicators.quote[0];
      const rows=r.timestamp.map((_,i)=>({h:q.high[i],l:q.low[i],c:q.close[i],v:q.volume[i]||0}))
        .filter(d=>d.h!=null&&d.l!=null&&d.c!=null&&d.c>0);
      if(rows.length<60) continue;
      return{highs:rows.map(d=>d.h),lows:rows.map(d=>d.l),closes:rows.map(d=>d.c),volumes:rows.map(d=>d.v),name:r.meta.longName||r.meta.shortName||ticker};
    }catch{ continue; }
  }
  throw new Error(`Ticker non trovato: ${ticker}  (prova suffisso: .MI .PA .DE .AS .L)`);
}

async function resolveName(query){
  const url=`https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&quotesCount=5`;
  const proxies=[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`
  ];
  for(const px of proxies){
    try{
      const res=await fetch(px,{signal:AbortSignal.timeout(8000)});
      if(!res.ok) continue;
      const j=await res.json();
      const eq=(j.quotes||[]).find(q=>q.quoteType==='EQUITY'||q.typeDisp==='Equity');
      if(eq) return eq.symbol;
    }catch{ continue; }
  }
  return null;
}

// ── MATH ──
function ema(d,p){ const k=2/(p+1),o=[d[0]]; for(let i=1;i<d.length;i++) o.push(d[i]*k+o[i-1]*(1-k)); return o; }
function rma(d,p){ const o=new Array(d.length).fill(0); let s=0; for(let i=0;i<p;i++)s+=d[i]; o[p-1]=s/p; for(let i=p;i<d.length;i++) o[i]=(o[i-1]*(p-1)+d[i])/p; return o; }
function donchian(H,L,p=20){ const h=H.slice(-p),l=L.slice(-p),u=Math.max(...h),lo=Math.min(...l); return{upper:u,lower:lo,mid:(u+lo)/2}; }
function adxCalc(H,L,C,p=14){
  const n=C.length;
  if(n<p*2+5) return{adx:20,pdi:20,ndi:20,atr:H[n-1]-L[n-1]};
  const tr=[],pd=[],nd=[];
  for(let i=1;i<n;i++){
    tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));
    const u=H[i]-H[i-1],dn=L[i-1]-L[i];
    pd.push(u>dn&&u>0?u:0); nd.push(dn>u&&dn>0?dn:0);
  }
  const aA=rma(tr,p),pA=rma(pd,p),nA=rma(nd,p);
  const dx=aA.map((a,i)=>{ if(a<1e-9)return 0; const pi=100*pA[i]/a,ni=100*nA[i]/a,s=pi+ni; return s<1e-9?0:100*Math.abs(pi-ni)/s; });
  const adA=rma(dx,p),last=aA.length-1;
  return{adx:adA[last],pdi:100*pA[last]/(aA[last]||1e-9),ndi:100*nA[last]/(aA[last]||1e-9),atr:aA[last]};
}
function obvCalc(C,V){
  let o=0; const s=[0];
  for(let i=1;i<C.length;i++){ if(C[i]>C[i-1])o+=V[i]; else if(C[i]<C[i-1])o-=V[i]; s.push(o); }
  const n=s.length,old=n>20?s[n-21]:s[0];
  return{slope:old!==0?(s[n-1]-old)/Math.abs(old)*100:0};
}
function computeScore(H,L,C,V){
  const n=C.length,px=C[n-1];
  const dc=donchian(H,L,20);
  const dcR=dc.upper-dc.lower,dcP=dcR>0?(px-dc.lower)/dcR:.5;
  const aboveUp=px>=dc.upper,belowLo=px<=dc.lower;
  const e20=ema(C,20)[n-1],e50=ema(C,50)[n-1],e200=ema(C,Math.min(n,200))[n-1];
  const adx=adxCalc(H,L,C,14);
  const obv=obvCalc(C,V);
  const rHigh=Math.max(...H.slice(-20)),ts=rHigh-2*adx.atr;
  const tsHit=px<=ts,tsBuf=adx.atr>0?(px-ts)/adx.atr:0;

  // SHORT (25)
  let st=0;
  if(aboveUp)st+=15; else if(dcP>=.75)st+=12; else if(dcP>=.5)st+=8; else if(dcP>=.25)st+=4;
  const d20=(px-e20)/e20;
  if(d20>.03)st+=10; else if(d20>.01)st+=7; else if(d20>0)st+=4; else if(d20>-.02)st+=2;
  st=Math.max(0,Math.min(25,st));

  // MEDIUM (35)
  let mt=0;
  if(adx.adx>=40)mt+=15; else if(adx.adx>=30)mt+=12; else if(adx.adx>=25)mt+=9; else if(adx.adx>=20)mt+=5; else mt+=1;
  const diD=adx.pdi-adx.ndi;
  if(diD>15)mt+=10; else if(diD>8)mt+=7; else if(diD>0)mt+=4; else if(diD>-8)mt+=2;
  if(e20>e50&&px>e20)mt+=10; else if(e20>e50)mt+=6; else if(Math.abs(e20-e50)/e50<.005)mt+=3;
  mt=Math.max(0,Math.min(35,mt));

  // LONG (40)
  let lt=0;
  const d200=(px-e200)/e200;
  if(d200>.10)lt+=15; else if(d200>.03)lt+=12; else if(d200>0)lt+=8; else if(d200>-.05)lt+=3;
  if(e20>e50&&e50>e200)lt+=10; else if(e50>e200)lt+=5;
  const sl=obv.slope;
  if(sl>5)lt+=10; else if(sl>1)lt+=7; else if(sl>0)lt+=4; else if(sl>-2)lt+=2;
  if(!tsHit&&tsBuf>3)lt+=5; else if(!tsHit&&tsBuf>1.5)lt+=3; else if(!tsHit)lt+=1;
  lt=Math.max(0,Math.min(40,lt));

  const total=st+mt+lt;
  let verdict,vc,signal;
  if(total>=75){verdict='STRONG TREND';vc='g';signal='▲ ENTRY ZONE';}
  else if(total>=55){verdict='TREND ACTIVE';vc='l';signal='— HOLD / ADD';}
  else if(total>=35){verdict='TREND WEAKENING';vc='w';signal='⚠ CONSIDER EXIT';}
  else{verdict='NO TREND / BREAKDOWN';vc='b';signal='▼ EXIT SIGNAL';}

  return{total,st,mt,lt,verdict,vc,signal,px,dc,dcP,aboveUp,belowLo,
    e20,e50,e200,adx:adx.adx,pdi:adx.pdi,ndi:adx.ndi,atr:adx.atr,
    ts,tsHit,tsBuf,obvSlope:obv.slope,d20,d200,emaAligned:e20>e50&&e50>e200};
}

const fmt=(v,d=2)=>v==null||isNaN(v)?'—':v.toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtP=v=>v==null||isNaN(v)?'—':(v>=0?'+':'')+(v*100).toFixed(1)+'%';
const clr=p=>p>=.75?'var(--bull)':p>=.5?'var(--blue)':p>=.3?'var(--warn)':'var(--bear)';
const VC={g:'bull',l:'hold',w:'weak',b:'bear'};
const VB={g:'badge-g',l:'badge-l',w:'badge-w',b:'badge-b'};
const RC={g:'var(--bull)',l:'var(--blue)',w:'var(--warn)',b:'var(--bear)'};

// ── ADD TICKER ──
async function addTicker(){
  const raw = document.getElementById('addInp').value.trim();
  if(!raw) return;
  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  document.getElementById('addInp').value = '';

  // resolve: try as-is first, then by name
  let ticker = raw.replace(/\s+/g,'').toUpperCase();
  let data;

  const lid = 'ld_' + Date.now();
  const list = document.getElementById('tickerList');
  list.querySelector('.empty')?.remove();
  list.insertAdjacentHTML('beforeend',`<div class="row-loading" id="${lid}"><div class="row-spin"></div><span>Caricamento ${ticker}…</span></div>`);

  try{
    data = await fetchYahoo(ticker);
  } catch(e1){
    showToast('Ricerca per nome…');
    const resolved = await resolveName(raw);
    if(resolved){
      ticker = resolved;
      document.querySelector(`#${lid} span`).textContent = `Caricamento ${ticker}…`;
      try{ data = await fetchYahoo(ticker); }
      catch(e2){ document.getElementById(lid)?.remove(); showToast('❌ '+e2.message,3200); btn.disabled=false; if(!watchlist.length) renderList(); return; }
    } else {
      document.getElementById(lid)?.remove(); showToast('❌ Non trovato. Prova il ticker diretto.',3000); btn.disabled=false; if(!watchlist.length) renderList(); return;
    }
  }

  if(watchlist.find(w=>w.ticker===ticker)){
    document.getElementById(lid)?.remove(); showToast('⚠ '+ticker+' già in watchlist'); btn.disabled=false; renderList(); return;
  }

  const sc = computeScore(data.highs,data.lows,data.closes,data.volumes);
  scores[ticker] = sc;
  watchlist.push({ticker, name:data.name, fav:false, ts:Date.now()});
  document.getElementById(lid)?.remove();
  await save();
  renderList();
  showToast('✓ '+ticker+' aggiunto');
  btn.disabled = false;
}

    return;
  }
  document.getElementById('listLabel').textContent = `— ${watchlist.length} ticker —`;
  const sorted = [...watchlist].sort((a,b)=>{
    if(a.fav!==b.fav) return a.fav?-1:1;
    return (scores[b.ticker]?.total??-1) - (scores[a.ticker]?.total??-1);
  });
  el.innerHTML = sorted.map(w=>rowHtml(w)).join('');

    sorted.forEach(w=>{
      const sc=scores[w.ticker]; if(!sc) return;

      document.querySelectorAll(`[data-tkb="${w.ticker}"]`).forEach(f=>{ f.style.width=f.dataset.w+'%'; });

  });
}

// ── SETTINGS ──
function openSettings(){ document.getElementById('sbUrlI').value=sbUrl(); document.getElementById('sbKeyI').value=sbKey(); document.getElementById('mSt').textContent=''; document.getElementById('settingsOv').classList.add('open'); }
function closeSettings(){ document.getElementById('settingsOv').classList.remove('open'); }
function closeSettingsOut(e){ if(e.target===document.getElementById('settingsOv')) closeSettings(); }
function setMSt(msg,cls){ const el=document.getElementById('mSt'); el.textContent=msg; el.className='m-status'+(cls?' '+cls:''); }

async function connectSupabase(){
  const url=document.getElementById('sbUrlI').value.trim();
  const key=document.getElementById('sbKeyI').value.trim();
  if(!url||!key){setMSt('⚠ Inserisci URL e Anon Key','err');return;}
  localStorage.setItem(K_URL,url); localStorage.setItem(K_KEY,key);
  setMSt('Connessione in corso…','');  dot('spin');
  try{
    const r=await fetch(`${url}/rest/v1/data?key=eq.${SB_ROW}&select=value`,{headers:{'apikey':key,'Authorization':'Bearer '+key}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const rows=await r.json();
    if(rows[0]?.value){ try{ const a=JSON.parse(rows[0].value); if(Array.isArray(a)){watchlist=a;saveLocal();renderList();} }catch{} }
    else await sbSet(SB_ROW,JSON.stringify(watchlist));
    dot('ok'); setMSt('✓ Connesso e sincronizzato','ok');
    setTimeout(closeSettings,1400);
  }catch(e){ dot('err'); setMSt('❌ '+e.message,'err'); }
}
async function clearAll(){ if(!confirm('Cancellare tutti i dati locali?'))return; watchlist=[];scores={};localStorage.removeItem(K_WL);localStorage.removeItem(K_SC);renderList();closeSettings();showToast('🗑 Dati cancellati'); }

// ── TOAST ──
let _tt;
function showToast(msg,dur=2000){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),dur); }

// ── INIT ──
document.getElementById('addInp').addEventListener('keydown',e=>{ if(e.key==='Enter') addTicker(); });
(async()=>{ await loadData(); renderList(); if(sbOk()) dot('ok'); })();
</script>
